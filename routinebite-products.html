<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>누띠 — 맞춤 간식 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/products.css">
</head>
<body>

<header class="header">
  <div class="logo">누<em>띠</em></div>
  <div class="header-right">
    <div class="header-sub">Nutti</div>
    <button class="back-btn" onclick="window.location.href='index.html'">← 계산기로</button>
  </div>
</header>

<div class="persona-bar">
  <div class="persona-tag" id="pNameTag" style="display:none;">🐾 <span id="pName"></span></div>
  <div class="persona-tag">🐶 <span id="pBreed">소형견</span></div>
  <div class="persona-tag">🎂 <span id="pAge">성견</span></div>
  <div class="persona-tag">⚡ <span id="pAct">보통</span></div>
  <div class="persona-tag" id="pBcsTag" style="display:none;">⚖️ <span id="pBcs"></span></div>
  <div class="persona-tag">💚 <span id="pHealth">없음</span></div>
  <div class="persona-edit" onclick="window.location.href='index.html'">다시 계산하기 ↗</div>
</div>

<div class="hero">
  <div class="hero-eyebrow">누띠 · 맞춤 간식 추천</div>
  <h1 class="hero-title" id="heroTitle">내 강아지에게 <em>딱 맞는</em><br>간식 루틴</h1>
  <p class="hero-desc" id="heroDesc">국내 제조 프리미엄 수제간식. 견종·연령·건강 상태에 맞는 제품을 추천해 드립니다.</p>
</div>

<div id="matchBanner" class="match-banner">
  <span>🎯 <strong id="matchCount">0</strong>개 제품이 추천됩니다</span>
  <span class="match-banner-close" onclick="document.getElementById('matchBanner').classList.remove('show')">✕</span>
</div>

<div class="filter-wrap">
  <span class="filter-label">기능</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="setFilter('관절',this)">🦴 관절</button>
  <button class="filter-btn" onclick="setFilter('피부',this)">🌿 피부·모질</button>
  <button class="filter-btn" onclick="setFilter('다이어트',this)">🥗 다이어트</button>
  <button class="filter-btn" onclick="setFilter('빈혈',this)">💊 빈혈·기력</button>
  <button class="filter-btn" onclick="setFilter('두뇌',this)">🧠 두뇌발달</button>
  <button class="filter-btn" onclick="setFilter('면역',this)">🛡 면역력</button>
  <div class="filter-sep"></div>
  <span class="filter-label">질감</span>
  <button class="filter-btn" onclick="setFilter('SOFT',this)">SOFT</button>
  <button class="filter-btn" onclick="setFilter('MIDDLE',this)">MIDDLE</button>
  <button class="filter-btn" onclick="setFilter('HARD',this)">HARD</button>
  <button class="filter-btn" onclick="setFilter('분말',this)">분말</button>
  <div class="filter-count" id="filterCount">27개 제품</div>
</div>

<div class="grid-wrap">
  <div class="products-grid" id="productsGrid"></div>
  <div class="empty" id="emptyState" style="display:none;"><div class="empty-icon">🐾</div><p>조건에 맞는 제품이 없습니다</p></div>
</div>

<script src="js/products.js"></script>
</body>
</html>
